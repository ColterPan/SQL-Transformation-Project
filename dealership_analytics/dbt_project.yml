name: "dealership_analytics"
version: "1.0.0"
config-version: 2

profile: "dealership_analytics"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
log-path: "logs"
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  dealership_analytics:
    +schema: raw
    raw:
      +quote_columns: false

models:
  dealership_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
